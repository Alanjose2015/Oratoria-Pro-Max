<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Oratoria Pro</title><style>body{font-family:sans-serif;background:#0f172a;color:#f8fafc;padding:15px;text-align:center;margin:0}.box{background:#1e293b;padding:15px;border-radius:8px;margin:10px 0;text-align:left}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0}.card{background:#1e293b;padding:10px;border-radius:8px}.num{font-size:20px;font-weight:bold;color:#3b82f6}button{width:100%;padding:12px;font-weight:bold;border-radius:20px;border:none;background:#10b981;color:white;cursor:pointer}button.rec{background:#ef4444}.plan{background:#172554;border-left:4px solid #3b82f6;padding:10px;margin-top:10px;display:none}textarea{width:100%;height:100px;background:#0f172a;color:#f8fafc;border:1px solid #475569;border-radius:6px;padding:8px;box-sizing:border-box;margin-top:8px}.sc{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0f172a;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;padding:20px;box-sizing:border-box}.ac{background:#1e293b;padding:25px;border-radius:12px;width:100%;max-width:350px}.ac input{width:100%;padding:12px;margin:8px 0;background:#0f172a;border:1px solid #475569;color:white;border-radius:8px;box-sizing:border-box}.lk{margin-top:12px;font-size:14px;color:#3b82f6;cursor:pointer;display:inline-block}.hd{display:none!important}</style><script src="https://gstatic.com"></script><script src="https://gstatic.com"></script></head><body><div id="aS" class="sc"><div class="ac"><h3 id="aT">🚀 Iniciar Sesión Pro</h3><input type="email" id="aE" placeholder="Correo electrónico"><input type="password" id="aP" placeholder="Contraseña"><button id="bM" style="margin-top:10px">Ingresar</button><button id="bR" class="hd" style="margin-top:10px">Recuperar Clave</button><div><span id="lT" class="lk">¿No tenés cuenta? Registrate</span><br><span id="lF" class="lk">¿Olvidaste tu contraseña?</span></div></div></div><div id="appS" class="hd"><div style="display:flex;justify-content:space-between;background:#1e293b;padding:10px;border-radius:8px;font-size:13px;margin-bottom:10px"><span id="uD">👤 Cargando...</span><button id="bLo" style="width:auto;padding:4px 10px;background:#ef4444;border-radius:6px;font-size:11px">Salir</button></div><h2>🎙️ Evaluador Inteligente Pro</h2><div class="box"><strong>Tu propio discurso:</strong><textarea id="cS" placeholder="Pegá acá tu texto..."></textarea></div><button id="btn">Iniciar Práctica</button><div class="grid"><div class="card">⏱️ Tiempo<div id="mTime" class="num">0s</div></div><div class="card">⚡ Ritmo<div id="mSpeed" class="num">0</div></div><div class="card">⚠️ Muletillas<div id="mFillers" class="num">0</div></div><div class="card">🎯 Claridad<div id="mConfidence" class="num">0%</div></div></div><div class="box"><h4>📊 Diagnóstico:</h4><p id="res">Presioná Iniciar...</p></div><div id="pBox" class="plan"><h4>📋 PLAN DE ACCIÓN:</h4><div id="pList"></div></div><div id="tx" style="font-size:11px;color:#94a3b8;text-align:left;white-space:pre-wrap"></div></div><script>const firebaseConfig={apiKey:"TU_API_KEY_AQUÍ",authDomain:"TU_PROJECT_://firebaseapp.com",projectId:"TU_PROJECT_ID",storageBucket:"TU_PROJECT_://appspot.com",messagingSenderId:"TU_MESSAGING_SENDER_ID",appId:"TU_APP_ID"};firebase.initializeApp(firebaseConfig);const auth=firebase.auth();const aS=document.getElementById('aS'),appS=document.getElementById('appS'),aT=document.getElementById('aT'),aE=document.getElementById('aE'),aP=document.getElementById('aP'),bM=document.getElementById('bM'),bR=document.getElementById('bR'),lT=document.getElementById('lT'),lF=document.getElementById('lF'),uD=document.getElementById('uD'),bLo=document.getElementById('bLo');let m='login';lT.onclick=()=>{if(m==='login'){m='reg';aT.textContent="📝 Registro Pro";bM.textContent="Registrarme";lT.textContent="Ya tengo cuenta";aP.classList.remove('hd');bR.classList.add('hd');bM.classList.remove('hd')}else{m='login';aT.textContent="🚀 Iniciar Sesión Pro";bM.textContent="Ingresar";lT.textContent="No tengo cuenta";aP.classList.remove('hd');bR.classList.add('hd');bM.classList.remove('hd')}};lF.onclick=()=>{m='reset';aT.textContent="🔑 Recuperar Clave";aP.classList.add('hd');bM.classList.add('hd');bR.classList.remove('hd');lT.textContent="Volver al Login"};bM.onclick=async()=>{const e=aE.value.trim(),p=aP.value;if(!e||!p)return alert("Completa los datos");try{if(m==='login'){await auth.signInWithEmailAndPassword(e,p)}else{await auth.createUserWithEmailAndPassword(e,p);alert("¡Cuenta Pro Creada!")}}catch(x){alert(x.message)}};bR.onclick=async()=>{const e=aE.value.trim();if(!e)return alert("Ingresa tu correo");try{await auth.sendPasswordResetEmail(e);alert("🔑 Correo enviado!");lT.click()}catch(x){alert(x.message)}};bLo.onclick=()=>auth.signOut();auth.onAuthStateChanged(u=>{if(u){aS.classList.add('hd');appS.classList.remove('hd');uD.textContent=`👤 Pro: ${u.email}`}else{aS.classList.remove('hd');appS.classList.add('hd')}});const Rec=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new Rec();r.continuous=true;r.interimResults=true;r.lang='es-ES';let isRec=false,t0,interval,textCollected="";const mul=["este","eh","bueno","o sea","nada","tipo","digamos","entonces","básicamente","así","verdad","claro","bueno","entonces"];const btn=document.getElementById('btn'),mTime=document.getElementById('mTime'),mSpeed=document.getElementById('mSpeed'),mFillers=document.getElementById('mFillers'),mConfidence=document.getElementById('mConfidence'),res=document.getElementById('res'),pBox=document.getElementById('pBox'),pList=document.getElementById('pList'),tx=document.getElementById('tx');btn.onclick=()=>{if(!isRec){r.start();isRec=true;btn.textContent="Detener y Evaluar";btn.classList.add('rec');tx.textContent="";res.innerHTML="🎙️ Grabando...";pBox.style.display="none";t0=Date.now();textCollected="";interval=setInterval(()=>{mTime.textContent=Math.floor((Date.now()-t0)/1000)+"s"},1000)}else{r.stop();clearInterval(interval);isRec=false;btn.textContent="Iniciar Práctica";btn.classList.remove('rec');res.innerHTML="🔄 Evaluando...";setTimeout(runAi,600)}};r.onresult=(e)=>{let parte="";for(let i=e.resultIndex;i<e.results.length;i++){parte+=e.results[i][0].transcript+" "}textCollected+=parte;tx.textContent="Texto capturado: "+textCollected};function runAi(){const textoFinal=textCollected.trim();const palabras=textoFinal.split(/\s+/).filter(w=>w.length>1);const cantidadPalabras=palabras.length;if(cantidadPalabras<3){res.innerHTML="❌ Audio muy corto o no detectado.";mSpeed.textContent=0;mFillers.textContent=0;mConfidence.textContent="0%";return}let contadorMuletillas=0;palabras.forEach(pal=>{const limpia=pal.toLowerCase().replace(/[.,;:?!]/g,"");if(mul.includes(limpia))contadorMuletillas++});mFillers.textContent=contadorMuletillas;const segundos=Math.max(1,Math.floor((Date.now()-t0)/1000));const ppm=Math.round((cantidadPalabras/segundos)*60);mSpeed.textContent=ppm;mConfidence.textContent="94%";let diagnostico="";if(ppm>145)diagnostico="🏎️ <strong>Ritmo rápido ("+ppm+" PPM):</strong> Bajá velocidad y hacé pausas.";else if(ppm<100)diagnostico="🐢 <strong>Ritmo lento ("+ppm+" PPM):</strong> Ponéle más energía.";else diagnostico="🎯 <strong>Ritmo perfecto ("+ppm+" PPM):</strong> ¡Impecable!";diagnostico+=contadorMuletillas>1?"<br>⚠️ Muletillas detectadas: "+contadorMuletillas: "<br>✅ Sin muletillas, excelente.";res.innerHTML=diagnostico;let plan="";if(ppm>145)plan+="<p>• Practicá leyendo despacio marcando los puntos.</p>";if(ppm<100)plan+="<p>• Grabate y escuchate para ganar fluidez.</p>";if(contadorMuletillas>1)plan+="<p>• Pensá la frase antes de hablar para evitar rellenos.</p>";if(plan){pList.innerHTML=plan;pBox.style.display="block"}};</script></body></html>
